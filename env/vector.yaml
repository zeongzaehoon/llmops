version: '3.8'
services:
  config_node:
    environment:
      # for vector
      - ETCD_ENDPOINTS=solomon-vector-etcd:2379
      - MINIO_ADDRESS=solomon-vector-minio:9000
      # for etcd
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
      # for minio
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      # for attu
      - MILVUS_URL=solomon-vector:19530
      - ATTU_PROXY_MODE=true
